<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --accent3: #f472b6;
    }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      background: #0a0a0f;
      color: #fff;
    }

    /* ===== HERO BG ===== */
    #hero-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, #1e0a3c 0%, #0a0a0f 60%),
                  radial-gradient(ellipse at 80% 20%, #0a1628 0%, transparent 60%);
      transition: background 0.5s;
    }

    #hero-bg.has-image {
      background: none;
    }

    #hero-bg-img {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      transition: opacity 1s ease;
      display: none;
    }

    #hero-bg-img.loaded {
      opacity: 1;
    }

    #hero-bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(135deg, rgba(10,10,15,0.82) 0%, rgba(30,10,60,0.70) 50%, rgba(10,22,40,0.80) 100%);
      backdrop-filter: blur(2px);
      display: none;
    }

    #hero-bg-overlay.visible { display: block; }

    /* ===== PARTICLES ===== */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* ===== GRID LINES ===== */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(124,58,237,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ===== GLOWING ORBS ===== */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      z-index: 1;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .orb1 { width: 500px; height: 500px; background: #7c3aed; top: -150px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 400px; height: 400px; background: #06b6d4; bottom: -100px; right: -100px; animation-delay: 3s; }
    .orb3 { width: 300px; height: 300px; background: #f472b6; top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: 1.5s; }

    @keyframes orbFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }
    .orb3 { animation-name: orbFloat3; }
    @keyframes orbFloat3 {
      0%, 100% { transform: translate(-50%,-50%) scale(1); }
      50% { transform: translate(-50%, calc(-50% - 20px)) scale(1.08); }
    }

    /* ===== MAIN CONTENT ===== */
    main {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* Top badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.35);
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #c4b5fd;
      margin-bottom: 2rem;
      animation: fadeSlideDown 0.8s ease both;
    }

    .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #7c3aed;
      box-shadow: 0 0 8px #7c3aed;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    /* Hero title */
    .hero-title {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -2px;
      margin-bottom: 1.5rem;
      animation: fadeSlideDown 0.9s ease both 0.1s;
    }

    .gradient-text {
      background: linear-gradient(135deg, #fff 20%, #c4b5fd 50%, #67e8f9 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .highlight-text {
      background: linear-gradient(135deg, #7c3aed, #06b6d4, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }

    /* Subtitle */
    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      max-width: 520px;
      line-height: 1.7;
      margin-bottom: 3rem;
      animation: fadeSlideDown 1s ease both 0.2s;
    }

    /* CTA buttons */
    .cta-wrap {
      animation: fadeSlideDown 1.1s ease both 0.3s;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .cta-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 18px 48px;
      border-radius: 60px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 40px rgba(124,58,237,0.45), 0 8px 30px rgba(0,0,0,0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      overflow: hidden;
    }

    .cta-btn.login-btn {
      background: linear-gradient(135deg, #059669, #10b981);
      box-shadow: 0 0 40px rgba(16,185,129,0.40), 0 8px 30px rgba(0,0,0,0.4);
    }

    .cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      border-radius: inherit;
    }

    .cta-btn::after {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4, #f472b6);
      border-radius: inherit;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .cta-btn.login-btn::after {
      background: linear-gradient(135deg, #059669, #34d399, #10b981);
    }

    .cta-btn:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 0 60px rgba(124,58,237,0.6), 0 12px 40px rgba(0,0,0,0.5);
    }

    .cta-btn.login-btn:hover {
      box-shadow: 0 0 60px rgba(16,185,129,0.6), 0 12px 40px rgba(0,0,0,0.5);
    }

    .cta-btn:hover::after { opacity: 1; }
    .cta-btn:active { transform: translateY(-1px) scale(1.01); }

    .btn-icon {
      width: 22px; height: 22px;
      transition: transform 0.3s ease;
    }

    .cta-btn:hover .btn-icon { transform: translateX(5px); }

    /* Shine sweep on btn */
    .cta-btn .shine {
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: skewX(-20deg);
      animation: shine 3s ease infinite 1s;
    }

    @keyframes shine {
      0% { left: -100%; }
      30%, 100% { left: 130%; }
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 2.5rem;
      margin-top: 3.5rem;
      animation: fadeSlideDown 1.2s ease both 0.5s;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 1.6rem;
      font-weight: 900;
      background: linear-gradient(135deg, #c4b5fd, #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Bottom scroll hint */
    .scroll-hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0.35;
      animation: fadeSlideDown 1.5s ease both 1s;
    }

    .scroll-hint span {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .scroll-arrow {
      width: 18px; height: 28px;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 10px;
      position: relative;
    }

    .scroll-arrow::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 8px;
      background: #fff;
      border-radius: 3px;
      animation: scrollDot 1.5s ease-in-out infinite;
    }

    @keyframes scrollDot {
      0%, 100% { top: 4px; opacity: 1; }
      80% { top: 14px; opacity: 0; }
    }

    /* Animations */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Admin link (hidden) */
    .admin-link {
      position: fixed;
      bottom: 1.2rem;
      right: 1.5rem;
      z-index: 100;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.12);
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.3s;
    }
    .admin-link:hover { color: rgba(255,255,255,0.5); }

    @media (max-width: 600px) {
      .stats-row { gap: 1.5rem; }
      .cta-btn { padding: 16px 36px; font-size: 1rem; }
      .hero-title { letter-spacing: -1px; }
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div id="hero-bg"></div>
  <img id="hero-bg-img" src="" alt="hero background"/>
  <div id="hero-bg-overlay"></div>
  <div class="grid-overlay"></div>

  <!-- Glowing orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- Particle canvas -->
  <canvas id="particles"></canvas>

  <!-- Main content -->
  <main>
    <div class="badge">
      <span class="badge-dot"></span>
      <span id="site-name">Welcome</span>
    </div>

    <h1 class="hero-title">
      <span class="gradient-text" id="hero-title-line1">Join Us</span><br/>
      <span class="highlight-text" id="hero-title-line2">Today</span>
    </h1>

    <p class="hero-subtitle" id="hero-subtitle">
      Click the button below to get started on your journey
    </p>

    <div class="cta-wrap">
      <a href="#" id="cta-btn" class="cta-btn" target="_blank" rel="noopener">
        <span class="shine"></span>
        <span id="btn-text">Sign Up Now</span>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
      <a href="#" id="login-btn" class="cta-btn login-btn" target="_blank" rel="noopener" style="display:none">
        <span class="shine"></span>
        <span id="login-btn-text">Login</span>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/>
        </svg>
      </a>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-num">10K+</div>
        <div class="stat-label">Members</div>
      </div>
      <div class="stat">
        <div class="stat-num">99%</div>
        <div class="stat-label">Satisfaction</div>
      </div>
      <div class="stat">
        <div class="stat-num">24/7</div>
        <div class="stat-label">Support</div>
      </div>
    </div>
  </main>

  <div class="scroll-hint">
    <div class="scroll-arrow"></div>
    <span>Scroll</span>
  </div>

  <a href="/admin" class="admin-link">⚙ admin</a>

  <script>
    // Load settings from server
    async function loadSettings() {
      try {
        const res = await fetch('/api/settings');
        const s = await res.json();

        // Update text
        if (s.siteName) document.getElementById('site-name').textContent = s.siteName;
        if (s.heroTitle) {
          const parts = s.heroTitle.split(' ');
          const mid = Math.ceil(parts.length / 2);
          document.getElementById('hero-title-line1').textContent = parts.slice(0, mid).join(' ');
          document.getElementById('hero-title-line2').textContent = parts.slice(mid).join(' ') || '';
        }
        if (s.heroSubtitle) document.getElementById('hero-subtitle').textContent = s.heroSubtitle;
        if (s.buttonText) document.getElementById('btn-text').textContent = s.buttonText;
        if (s.redirectLink) {
          const btn = document.getElementById('cta-btn');
          btn.href = s.redirectLink;
          btn.onclick = (e) => { e.preventDefault(); window.open(s.redirectLink, '_blank'); };
        }

        // Login button
        if (s.loginLink) {
          const loginBtn = document.getElementById('login-btn');
          loginBtn.href = s.loginLink;
          loginBtn.style.display = 'inline-flex';
          loginBtn.onclick = (e) => { e.preventDefault(); window.open(s.loginLink, '_blank'); };
        }
        if (s.loginButtonText) {
          document.getElementById('login-btn-text').textContent = s.loginButtonText;
        }

        // Update background image
        if (s.heroImage) {
          const img = document.getElementById('hero-bg-img');
          const overlay = document.getElementById('hero-bg-overlay');
          const bg = document.getElementById('hero-bg');
          img.style.display = 'block';
          img.src = s.heroImage;
          img.onload = () => {
            img.classList.add('loaded');
            bg.classList.add('has-image');
            overlay.classList.add('visible');
          };
        }
      } catch(e) { console.error('Settings load failed', e); }
    }

    loadSettings();

    // ===== PARTICLES =====
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function randomParticle() {
      return {
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 2 + 0.3,
        dx: (Math.random() - 0.5) * 0.4,
        dy: (Math.random() - 0.5) * 0.4,
        alpha: Math.random() * 0.5 + 0.1,
        color: ['#7c3aed','#06b6d4','#f472b6','#ffffff'][Math.floor(Math.random()*4)]
      };
    }

    function initParticles() {
      particles = [];
      const count = Math.floor((W * H) / 8000);
      for (let i = 0; i < count; i++) particles.push(randomParticle());
    }

    function drawParticles() {
      ctx.clearRect(0, 0, W, H);
      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha;
        ctx.fill();
        ctx.globalAlpha = 1;
        p.x += p.dx; p.y += p.dy;
        if (p.x < 0 || p.x > W) p.dx *= -1;
        if (p.y < 0 || p.y > H) p.dy *= -1;
      }

      // Draw connections
      ctx.globalAlpha = 0.06;
      ctx.strokeStyle = '#7c3aed';
      ctx.lineWidth = 0.5;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dist = Math.hypot(a.x - b.x, a.y - b.y);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(drawParticles);
    }

    resize();
    initParticles();
    drawParticles();
    window.addEventListener('resize', () => { resize(); initParticles(); });

    // Mouse parallax on orbs
    document.addEventListener('mousemove', (e) => {
      const xRatio = (e.clientX / window.innerWidth - 0.5) * 20;
      const yRatio = (e.clientY / window.innerHeight - 0.5) * 20;
      document.querySelector('.orb1').style.transform = `translate(${xRatio}px, ${yRatio}px)`;
      document.querySelector('.orb2').style.transform = `translate(${-xRatio}px, ${-yRatio}px)`;
    });
  </script>
</body>
</html>
